name: Security Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[security]'

      - name: Audit Python dependencies
        run: make security-scan

      - name: Generate SBOM
        run: make sbom

      - name: Build container image
        run: docker build -t grantora-api:security -f containers/grantora-api.Dockerfile .

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: grantora-api:security
          format: json
          output: dist/security/container-vulnerabilities.json
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Publish security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grantora-security-artifacts
          path: dist/security/