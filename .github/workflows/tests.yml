name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run PostgreSQL integration tests with a disposable CI database
        required: false
        type: boolean
        default: false
      run_e2e:
        description: Run e2e tests against the documented local compose stack
        required: false
        type: boolean
        default: false
      run_backup_restore_smoke:
        description: Run the destructive backup/restore smoke during the e2e job
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Run unit tests
        run: make test-unit

  integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grantora
          POSTGRES_USER: grantora
          POSTGRES_PASSWORD: grantora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grantora -d grantora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GRANTORA_INTEGRATION_DATABASE_URL: postgresql+psycopg://grantora:grantora@localhost:5432/grantora
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run integration tests
        run: make test-integration

  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e }}
    needs: unit
    runs-on: ubuntu-latest
    env:
      ADMIN_BOOTSTRAP_TOKEN: grantora-ci-admin-token
      APISIX_ADMIN_KEY: grantora-ci-apisix-key
      GRANTORA_AGENT_TOKEN_PEPPER: grantora-ci-token-pepper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Write local CI environment
        shell: bash
        run: |
          python - <<'PY' > .env
          import base64
          import hashlib
          import hmac
          import os

          admin_token = os.environ["ADMIN_BOOTSTRAP_TOKEN"]
          pepper = os.environ["GRANTORA_AGENT_TOKEN_PEPPER"]
          digest = hmac.new(pepper.encode(), admin_token.encode(), hashlib.sha256).hexdigest()
          fernet_key = base64.urlsafe_b64encode(os.urandom(32)).decode()

          print("GRANTORA_ENV=development")
          print("GRANTORA_PUBLIC_BASE_URL=http://localhost:9080")
          print("GRANTORA_API_URL=http://localhost:8080")
          print("GRANTORA_RUNTIME_URL=http://localhost:9080")
          print("APISIX_PUBLIC_URL=http://localhost:9080")
          print("APISIX_ADMIN_URL=http://apisix:9180")
          print(f"APISIX_ADMIN_KEY={os.environ['APISIX_ADMIN_KEY']}")
          print("APISIX_SYNC_ENABLED=true")
          print(f"SECRET_ENCRYPTION_KEY={fernet_key}")
          print(f"GRANTORA_AGENT_TOKEN_PEPPER={pepper}")
          print(f"ADMIN_BOOTSTRAP_TOKEN={admin_token}")
          print(f"GRANTORA_ADMIN_BOOTSTRAP_TOKEN_HASH=hmac-sha256:{digest}")
          print("GRANTORA_RUN_E2E=1")
          print("GRANTORA_E2E_API_URL=http://localhost:8080")
          print("GRANTORA_E2E_RUNTIME_URL=http://localhost:9080")
          print("GRANTORA_BACKUP_RESTORE_STARTUP_TIMEOUT_SECONDS=120")
          print("OIDC_TRUSTED_PROXY_CIDRS=127.0.0.1/32,::1/128")
          PY

      - name: Start local compose stack
        run: docker compose up --build -d --wait

      - name: Wait for runtime dependencies
        shell: bash
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          def wait_for(name: str, url: str, headers: dict[str, str] | None = None) -> None:
              deadline = time.monotonic() + 120
              last_error = None
              while time.monotonic() < deadline:
                  try:
                      request = urllib.request.Request(url, headers=headers or {})
                      with urllib.request.urlopen(request, timeout=3) as response:
                          if response.status < 500:
                              return
                  except Exception as exc:
                      last_error = exc
                  time.sleep(1)
              raise SystemExit(f"{name} did not become ready: {last_error}")

          wait_for("Grantora", "http://127.0.0.1:8080/readyz")
          wait_for(
              "APISIX Admin API",
              "http://127.0.0.1:9180/apisix/admin/routes",
              {"X-API-KEY": os.environ["APISIX_ADMIN_KEY"]},
          )
          PY

      - name: Run documented demo seed
        run: make demo-seed

      - name: Run documented smoke
        run: make smoke

      - name: Run e2e tests
        run: make test-e2e

      - name: Run backup/restore smoke
        if: ${{ inputs.run_backup_restore_smoke }}
        run: GRANTORA_RUN_BACKUP_RESTORE_SMOKE=1 make backup-restore-smoke

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop local compose stack
        if: always()
        run: docker compose down -v